<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quant Terminal | Professional Analytics</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-dark: #050505;
      --bg-card: rgba(15, 15, 20, 0.8);
      --accent: #00f2ff;
      --accent-dim: rgba(0, 242, 255, 0.15);
      --accent-bright: #70ffff;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --danger: #ff4d4d;
      --success: #00ff88;
      --sidebar-width: 320px;
      --header-height: 72px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden !important;
      display: flex;
      flex-direction: column;
    }

    /* Background Effects */
    .bg-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: float 20s infinite alternate;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -100px;
      right: -100px;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: #7000ff;
      bottom: -100px;
      left: -100px;
      animation-delay: -5s;
    }

    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(5, 5, 5, 0.9);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
    }

    .logo i {
      color: var(--accent);
      filter: drop-shadow(0 0 8px var(--accent));
    }

    .logo span {
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.35rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      gap: 0.25rem;
    }

    nav button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav button:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    nav button.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
    }

    /* Main Layout */
    .app-container {
      position: fixed;
      top: var(--header-height);
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    aside {
      width: var(--sidebar-width);
      border-right: 1px solid var(--border);
      background: rgba(10, 10, 15, 0.4);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative; /* Base for absolute buttons */
      overflow: hidden;
    }

    .sidebar-content {
      flex: 1;
      padding: 2rem;
      padding-bottom: 180px; /* Space for the fixed footer */
      overflow-y: auto;
      min-height: 0;
    }

    .sidebar-header {
      margin-bottom: 2rem;
    }

    .sidebar-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .sidebar-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .form-group label .val {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="number"], input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 242, 255, 0.05);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .action-buttons {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 2rem;
      background: rgba(10, 10, 15, 0.98);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      backdrop-filter: blur(20px);
      z-index: 20;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 242, 255, 0.3);
      background: var(--accent-bright);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-main);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--text-muted);
    }

    /* Main Content */
    main {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      position: relative;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 10px var(--success);
    }

    .dot.busy {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.5s infinite;
    }

    .dot.error {
      background: var(--danger);
      box-shadow: 0 0 10px var(--danger);
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
      100% { opacity: 1; transform: scale(1); }
    }

    #plot-container {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow-y: auto; /* Allow scrolling for tall plots */
      overflow-x: hidden;
      position: relative;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    #plot {
      width: 100%;
      height: 100%;
    }

    /* Loading Overlay */
    .loader-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .loader-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .quant-loader {
      width: 60px;
      height: 60px;
      border: 3px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.2em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    @media (max-width: 1024px) {
      .app-container { flex-direction: column; overflow-y: auto; height: auto; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: auto; overflow: visible; }
      .sidebar-content { overflow: visible; }
      .action-buttons { position: sticky; bottom: 0; z-index: 5; }
      body { overflow: auto; }
      #plot-container { min-height: 500px; }
    }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <header>
    <div class="logo">
      <i data-lucide="line-chart"></i>
      <span>QUANT TERMINAL</span>
    </div>
    <nav id="tabs">
      <button type="button" data-tab="p1" class="active">
        <i data-lucide="layers"></i> Greeks
      </button>
      <button type="button" data-tab="p2">
        <i data-lucide="activity"></i> Drawdown
      </button>
      <button type="button" data-tab="p3">
        <i data-lucide="network"></i> Regimes
      </button>
    </nav>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <span id="last-updated" style="font-size: 0.75rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;"></span>
      <i data-lucide="user" style="color: var(--text-muted); cursor: pointer;"></i>
    </div>
  </header>

  <div class="app-container">
    <aside>
      <div class="sidebar-content">
        <div id="controls-container">
          <!-- Controls will be rendered here -->
        </div>
      </div>
      
      <div class="action-buttons">
        <button type="button" class="btn btn-primary" id="runBtn">
          <i data-lucide="play"></i> Run Simulation
        </button>
        <button type="button" class="btn btn-secondary" id="resetBtn">
          <i data-lucide="refresh-cw"></i> Reset Defaults
        </button>
      </div>
    </aside>

    <main>
      <div class="status-bar">
        <div class="status-indicator">
          <div id="status-dot" class="dot"></div>
          <span id="status-text">System Ready</span>
        </div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-muted);">
          ENV: PRODUCTION | LATENCY: <span id="latency">--</span>ms
        </div>
      </div>

      <div id="plot-container">
        <div id="loader" class="loader-overlay">
          <div class="quant-loader"></div>
          <div class="loader-text">COMPUTING_MODELS...</div>
        </div>
        <div id="plot"></div>
      </div>
    </main>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    const state = { 
      tab: 'p1',
      loading: false,
      cache: {} 
    };

    const panels = {
      p1: {
        title: 'Option Greeks',
        desc: 'Black-Scholes manifold analysis',
        fields: [
          { key: 'K', label: 'Strike Price', type: 'number', step: '1', value: '100', min: 50, max: 200 },
          { key: 'r', label: 'Risk-free Rate', type: 'number', step: '0.01', value: '0.05', min: 0, max: 0.2 },
          { key: 'sigma', label: 'Volatility', type: 'number', step: '0.05', value: '0.25', min: 0.05, max: 1.0 },
          { key: 'T0', label: 'Time to Expiry', type: 'number', step: '0.1', value: '1', min: 0.1, max: 3.0 },
          { key: 'seed', label: 'Random Seed', type: 'number', step: '1', value: '42' },
        ],
        endpoint: '/api/p1',
      },
      p2: {
        title: 'Drawdown Analysis',
        desc: 'Monte Carlo risk topology',
        fields: [
          { key: 'n_paths', label: 'MC Paths', type: 'number', step: '100', value: '3000', min: 200, max: 15000 },
          { key: 'n_days', label: 'Trading Days', type: 'number', step: '1', value: '252', min: 60, max: 504 },
          { key: 'mu_ann', label: 'Annual Drift', type: 'number', step: '0.01', value: '0.12', min: -0.2, max: 0.5 },
          { key: 'sig_ann', label: 'Annual Vol', type: 'number', step: '0.01', value: '0.22', min: 0.05, max: 0.8 },
          { key: 'df_t', label: 'Student-t DF', type: 'number', step: '1', value: '4', min: 2, max: 30 },
          { key: 'shock_prob', label: 'Shock Prob', type: 'number', step: '0.01', value: '0.07', min: 0, max: 0.3 },
          { key: 'seed', label: 'Random Seed', type: 'number', step: '1', value: '7' },
        ],
        endpoint: '/api/p2',
      },
      p3: {
        title: 'Correlations',
        desc: 'Markov-Switching Dynamics',
        fields: [
          { key: 'n_days', label: 'Simulated Days', type: 'number', step: '1', value: '504', min: 120, max: 2000 },
          { key: 'win', label: 'Rolling Window', type: 'number', step: '1', value: '30', min: 10, max: 120 },
          { key: 'seed', label: 'Random Seed', type: 'number', step: '1', value: '99' },
        ],
        endpoint: '/api/p3',
      },
    };

    function renderControls() {
      const cfg = panels[state.tab];
      const container = document.getElementById('controls-container');
      
      let html = `
        <div class="sidebar-header">
          <h2>${cfg.title}</h2>
          <p>${cfg.desc}</p>
        </div>
      `;
      
      html += cfg.fields.map(f => `
        <div class="form-group">
          <label for="f-${f.key}">
            <span>${f.label}</span>
            <span class="val" id="val-${f.key}">${f.value}</span>
          </label>
          <input 
            id="f-${f.key}" 
            name="${f.key}" 
            type="${f.type}" 
            step="${f.step || 'any'}" 
            value="${f.value}"
            ${f.min !== undefined ? `min="${f.min}"` : ''}
            ${f.max !== undefined ? `max="${f.max}"` : ''}
            oninput="document.getElementById('val-${f.key}').textContent = this.value"
          />
        </div>
      `).join('');
      
      container.innerHTML = html;
    }

    function setStatus(msg, type = 'ready') {
      const text = document.getElementById('status-text');
      const dot = document.getElementById('status-dot');
      const loader = document.getElementById('loader');
      
      text.textContent = msg;
      dot.className = 'dot';
      
      if (type === 'loading') {
        dot.classList.add('busy');
        loader.classList.add('active');
        state.loading = true;
      } else if (type === 'error') {
        dot.classList.add('error');
        loader.classList.remove('active');
        state.loading = false;
      } else {
        loader.classList.remove('active');
        state.loading = false;
      }
    }

    function getParams() {
      const cfg = panels[state.tab];
      const params = new URLSearchParams();
      cfg.fields.forEach(f => {
        const val = document.getElementById(`f-${f.key}`).value;
        params.append(f.key, val);
      });
      return params.toString();
    }

    async function run() {
      if (state.loading) return;
      
      const startTime = performance.now();
      const cfg = panels[state.tab];
      const params = getParams();
      const cacheKey = `${state.tab}?${params}`;
      
      setStatus('Computing Models...', 'loading');
      
      try {
        let fig;
        if (state.cache[cacheKey]) {
          fig = state.cache[cacheKey];
          // Small delay to make it feel "quant-y" even with cache
          await new Promise(r => setTimeout(r, 200));
        } else {
          const response = await fetch(`${cfg.endpoint}?${params}`);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          fig = await response.json();
          state.cache[cacheKey] = fig;
        }

        const plotEl = document.getElementById('plot');
        
        // Prepare layout
        const layout = fig.layout ? JSON.parse(JSON.stringify(fig.layout)) : {};
        layout.autosize = true;
        layout.template = 'plotly_dark';
        layout.paper_bgcolor = 'rgba(0,0,0,0)';
        layout.plot_bgcolor = 'rgba(0,0,0,0)';
        
        // Enhanced Plotly config
        const config = {
          responsive: true,
          displayModeBar: 'hover',
          displaylogo: false,
          modeBarButtonsToRemove: ['select2d', 'lasso2d'],
          toImageButtonOptions: {
            format: 'png',
            filename: 'quant_terminal_export',
            height: 1080,
            width: 1920,
            scale: 2
          }
        };

        if (plotEl._fullLayout) Plotly.purge(plotEl);
        await Plotly.newPlot(plotEl, fig.data, layout, config);
        
        const endTime = performance.now();
        document.getElementById('latency').textContent = Math.round(endTime - startTime);
        document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
        
        setStatus('Analysis Complete', 'ready');
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    // Event Listeners
    document.getElementById('runBtn').onclick = run;
    
    document.getElementById('resetBtn').onclick = () => {
      const cfg = panels[state.tab];
      cfg.fields.forEach(f => {
        const inp = document.getElementById(`f-${f.key}`);
        if (inp) {
          inp.value = f.value;
          document.getElementById(`val-${f.key}`).textContent = f.value;
        }
      });
      run();
    };

    document.getElementById('tabs').onclick = (e) => {
      const btn = e.target.closest('button[data-tab]');
      if (!btn || state.loading) return;
      
      state.tab = btn.getAttribute('data-tab');
      document.querySelectorAll('#tabs button').forEach(b => {
        b.classList.toggle('active', b.getAttribute('data-tab') === state.tab);
      });
      
      renderControls();
      run();
    };

    window.onresize = () => {
      const plotEl = document.getElementById('plot');
      if (plotEl && plotEl._fullLayout) Plotly.Plots.resize(plotEl);
    };

    // Initial load
    renderControls();
    run();
  </script>
</body>
</html>
