<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cool Quant Projects — Live dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
    
    :root {
      --bg: #030303;
      --panel: rgba(18, 18, 30, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.3);
      --danger: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.5rem;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p { 
      margin: 0.2rem 0 0; 
      color: var(--muted); 
      font-size: 0.875rem; 
    }

    nav {
      display: flex;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.25rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    nav button {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    nav button:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    nav button.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: calc(100vh - 88px);
    }

    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
    }

    aside {
      border-right: 1px solid var(--border);
      padding: 2rem;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
    }

    aside h2 {
      margin: 0 0 1.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-family: 'Fira Code', monospace;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .actions button.primary {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 0.875rem;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    }

    .actions button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);
    }

    .actions button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.75rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .actions button.secondary:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-color: var(--muted);
    }

    main {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at center, rgba(56, 189, 248, 0.03) 0%, transparent 70%);
    }

    #plot {
      flex: 1;
      width: 100%;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      backdrop-filter: blur(4px);
      overflow: hidden;
      min-height: 600px;
    }

    #status {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    #status.error { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
    #status.error::before { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    
    #status.loading { color: var(--accent); background: rgba(56, 189, 248, 0.1); }
    #status.loading::before { 
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Cool Quant Projects</h1>
      <p>Live simulations — drag to rotate 3D plots. Change parameters and run again.</p>
    </div>
    <nav id="tabs">
      <button type="button" data-tab="p1" class="active">1 · Greeks</button>
      <button type="button" data-tab="p2">2 · Drawdown</button>
      <button type="button" data-tab="p3">3 · Correlations</button>
    </nav>
  </header>

  <div class="layout">
    <aside id="controls"></aside>
    <main>
      <div id="status">Ready.</div>
      <div id="plot"></div>
    </main>
  </div>

  <script>
    const state = { tab: 'p1' };

    const panels = {
      p1: {
        title: 'Option Greeks',
        fields: [
          { key: 'K', label: 'Strike K', type: 'number', step: '1', value: '100' },
          { key: 'r', label: 'Risk-free r', type: 'number', step: '0.01', value: '0.05' },
          { key: 'sigma', label: 'Volatility σ', type: 'number', step: '0.05', value: '0.25' },
          { key: 'T0', label: 'Years to expiry T₀', type: 'number', step: '0.1', value: '1' },
          { key: 'seed', label: 'Random seed', type: 'number', step: '1', value: '42' },
        ],
        endpoint: '/api/p1',
      },
      p2: {
        title: 'Drawdown topology',
        fields: [
          { key: 'n_paths', label: 'Monte Carlo paths', type: 'number', step: '100', value: '3000' },
          { key: 'n_days', label: 'Trading days', type: 'number', step: '1', value: '252' },
          { key: 'mu_ann', label: 'Drift μ (annual)', type: 'number', step: '0.01', value: '0.12' },
          { key: 'sig_ann', label: 'Vol σ (annual)', type: 'number', step: '0.01', value: '0.22' },
          { key: 'df_t', label: 't-dist df (fat tails)', type: 'number', step: '1', value: '4' },
          { key: 'shock_prob', label: 'Shock probability', type: 'number', step: '0.01', value: '0.07' },
          { key: 'fan_paths', label: 'Paths in fan chart', type: 'number', step: '5', value: '60' },
          { key: 'seed', label: 'Random seed', type: 'number', step: '1', value: '7' },
        ],
        endpoint: '/api/p2',
      },
      p3: {
        title: 'Correlation regimes',
        fields: [
          { key: 'n_days', label: 'Simulated days', type: 'number', step: '1', value: '504' },
          { key: 'win', label: 'Rolling window', type: 'number', step: '1', value: '30' },
          { key: 'seed', label: 'Random seed', type: 'number', step: '1', value: '99' },
        ],
        endpoint: '/api/p3',
      },
    };

    function renderControls() {
      const cfg = panels[state.tab];
      const el = document.getElementById('controls');
      el.innerHTML = '<h2>' + cfg.title + '</h2>' +
        cfg.fields.map(function (f) {
          return '<div class="field"><label for="f-' + f.key + '">' + f.label + '</label>' +
            '<input id="f-' + f.key + '" name="' + f.key + '" type="' + f.type + '" step="' + (f.step || 'any') + '" value="' + f.value + '" /></div>';
        }).join('') +
        '<div class="actions">' +
        '<button type="button" class="primary" id="runBtn">Run simulation</button>' +
        '<button type="button" class="secondary" id="resetBtn">Defaults</button></div>';
      document.getElementById('runBtn').onclick = run;
      document.getElementById('resetBtn').onclick = function () {
        cfg.fields.forEach(function (f) {
          var inp = document.getElementById('f-' + f.key);
          if (inp) inp.value = f.value;
        });
        run();
      };
    }

    function setStatus(msg, cls) {
      var s = document.getElementById('status');
      s.textContent = msg;
      s.className = cls || '';
    }

    function queryParams() {
      var cfg = panels[state.tab];
      var parts = [];
      cfg.fields.forEach(function (f) {
        var inp = document.getElementById('f-' + f.key);
        if (inp && inp.value !== '') parts.push(encodeURIComponent(f.key) + '=' + encodeURIComponent(inp.value));
      });
      return parts.join('&');
    }

    function plotConfig(fig) {
      var base = { responsive: true, displayModeBar: true, scrollZoom: true, displaylogo: false };
      if (fig && fig.config && typeof fig.config === 'object') {
        Object.keys(fig.config).forEach(function (k) { base[k] = fig.config[k]; });
      }
      return base;
    }

    function run() {
      var cfg = panels[state.tab];
      setStatus('Computing…', 'loading');
      var url = cfg.endpoint + '?' + queryParams();
      var plotEl = document.getElementById('plot');
      fetch(url)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (fig) {
          if (!fig || !Array.isArray(fig.data)) {
            throw new Error('Invalid response: missing figure data');
          }
          var layout = fig.layout ? JSON.parse(JSON.stringify(fig.layout)) : {};
          layout.autosize = true;
          layout.margin = Object.assign({ t: 50, r: 20, b: 36, l: 56 }, layout.margin || {});
          if (!layout.height) layout.height = Math.max(480, plotEl.clientHeight || 520);
          try {
            if (plotEl._fullLayout) Plotly.purge(plotEl);
          } catch (e) { /* first paint */ }
          return Plotly.newPlot(plotEl, fig.data, layout, plotConfig(fig));
        })
        .then(function () {
          try {
            return Plotly.Plots.resize(plotEl);
          } catch (e) {
            return null;
          }
        })
        .then(function () {
          setStatus('Done. Drag the chart to rotate (3D) or zoom.', '');
        })
        .catch(function (e) {
          setStatus('Error: ' + e.message, 'error');
          console.error(e);
        });
    }

    window.addEventListener('resize', function () {
      var plotEl = document.getElementById('plot');
      try {
        if (plotEl && plotEl._fullLayout) Plotly.Plots.resize(plotEl);
      } catch (e) { /* no plot yet */ }
    });

    document.getElementById('tabs').addEventListener('click', function (ev) {
      var btn = ev.target.closest('button[data-tab]');
      if (!btn) return;
      state.tab = btn.getAttribute('data-tab');
      document.querySelectorAll('#tabs button').forEach(function (b) {
        b.classList.toggle('active', b.getAttribute('data-tab') === state.tab);
      });
      renderControls();
      run();
    });

    renderControls();
    run();
  </script>
</body>
</html>
